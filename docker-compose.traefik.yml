# Fuel Rush — Traefik reverse proxy configuration
# Use with: docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
#
# Prerequisites:
#   1. Traefik running with Docker provider enabled
#   2. A domain pointing to your server's IP
#   3. Optionally: ACME (Let's Encrypt) configured for automatic HTTPS

version: "3.8"

services:
  fuel-rush-web:
    restart: unless-stopped
    networks:
      - web
    labels:
      # Traefik router
      - "traefik.enable=true"
      - "traefik.http.routers.fuel-rush.entrypoints=websecure"
      - "traefik.http.routers.fuel-rush.tls.certresolver=letsencrypt"

      # Change YOUR_DOMAIN to your actual domain
      - "traefik.http.routers.fuel-rush.rule=Host(`fuelrush.YOUR_DOMAIN`)"
      - "traefik.http.routers.fuel-rush.service=fuel-rush-web"

      # Load balancer
      - "traefik.http.services.fuel-rush-web.loadbalancer.server.port=80"

      # Security headers via middleware
      - "traefik.http.routers.fuel-rush.middlewares=fuel-rush-headers"

      # Custom headers middleware
      - "traefik.http.middlewares.fuel-rush-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.fuel-rush-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.fuel-rush-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.fuel-rush-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.fuel-rush-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.fuel-rush-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.fuel-rush-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.fuel-rush-headers.headers.stsPreload=true"

networks:
  web:
    name: web
    external: true
